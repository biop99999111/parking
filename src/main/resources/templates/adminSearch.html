<style>
    :root {
        --main-green: #4CAF50; /* 입차 버튼 색상 */
        --main-skyblue: #2196F3; /* 출차 버튼 색상 */
        --main-blue: #0000FF; /* 관리자 로그인 버튼 색상 */
    }

    body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
    
    /* 카드 및 헤더 디자인 */
    .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .card-header { 
        background-color: white !important; 
        color: #333 !important; 
        border-bottom: 2px solid #eee; 
        font-weight: bold; 
        font-size: 1.5rem;
        text-align: center;
        padding: 20px;
    }

    /* 메인 이미지의 버튼 스타일을 닮은 검색/삭제 버튼 */
    .btn-primary { background-color: var(--main-skyblue); border: none; height: 50px; font-weight: bold; border-radius: 8px; }
    .btn-primary:hover { background-color: #1976D2; }
    
    .btn-danger { background-color: #ff4d4d; border: none; border-radius: 8px; }
    
    /* 입력창 스타일 */
    .form-control, .form-select {
        height: 50px;
        border: 1px solid #ddd;
        border-radius: 8px;
    }

    /* 테이블 디자인 */
    .table thead { background-color: #f1f1f1; }
    .badge-success { background-color: var(--main-green); }
    .badge-secondary { background-color: #9e9e9e; }

    .title-icon { width: 30px; margin-right: 10px; vertical-align: middle; }
</style>
<!-- 상단 CSS 생략 -->
<div class="container mt-5">
    <div class="text-center mb-4">
        <h3 class="fw-bold">🔍 차량 검색 결과</h3>
        <p class="text-muted">'<span th:text="${keyword}" class="text-primary fw-bold"></span>' 검색 결과 총 <span th:text="${#lists.size(searchList)}"></span>건</p>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body text-center">
            <a th:href="@{/admin}" class="btn btn-dark w-100" style="background-color: var(--main-blue); border:none; height:50px; line-height:35px; font-weight:bold;">
                전체 리스트로 돌아가기
            </a>
        </div>
    </div>

    <!-- 결과 리스트 (admin.html과 동일한 테이블 스타일) -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 text-center align-middle">
                <thead class="table-light">
                    <tr>
                        <th>순번</th>
                        <th>차량번호</th>
                        <th>입차시간</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="car, iter : ${searchList}">
                        <td th:text="${iter.count}">1</td>
                        <td class="fw-bold text-primary" th:text="${car.carNo}">12가 3456</td>
                        <td th:text="${car.entryTime}">2026-03-03 10:00</td>
                        <td>
                            <span th:if="${car.exitTime == null}" class="badge badge-success p-2">주차 중</span>
                            <span th:if="${car.exitTime != null}" class="badge badge-secondary p-2">출차 완료</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/delete}" method="post">
                                <input type="hidden" name="carNo" th:value="${car.carNo}">
                                <button type="submit" class="btn btn-danger btn-sm">삭제</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
