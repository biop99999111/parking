
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주차 관리 프로그램</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 0;
        padding: 0;
        background-color: #f0f0f0;
      }

      .container {
        width: 100%;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 30px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      .input-group input {
        padding: 10px;
        width: 95%;
        font-size: 1.2rem;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        background-color: #4caf50;
        color: white;
        padding: 15px;
        margin: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.5rem;
        width: 100%;
        display: block;
      }

      button:hover {
        background-color: #45a049;
      }

      .spacer {
        margin-bottom: 30px;
      }

      .button-container {
        display: flex;
        justify-content: space-between;
      }

      .button-container form {
        width: 48%; /* 버튼을 양옆에 배치 */
      }

      #login_button{
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>주차 관리</h1>

      <!-- 입차 폼 -->
      <form action="/parking/enter">
      	
        <div class="input-group">
          <input type="hidden" name="entryTime" th:value="${#dates.format(T(java.time.LocalDateTime).now(), 'yyyy-MM-dd HH:mm:ss')}">
          <input
            type="text"
            placeholder="입차 차량 번호를 입력하세요"
            name="carNo" required
          />
        </div>
        <button type="submit">입차</button>
      </form>

      <div class="spacer"></div>

      <!-- 출차 폼 -->
      <form action="/parking/exit" >
        <div class="input-group">
          <input type="hidden" name="exitTime" th:value="${#dates.format(T(java.time.LocalDateTime).now(), 'yyyy-MM-dd HH:mm:ss')}">
          <input
            type="text"
            placeholder="출차 차량 번호를 입력하세요"
            name="carNo" required
          />
        </div>
        <button type="submit">출차</button>
      </form>

      <div class="spacer"></div>

      <!-- 로그인 버튼 -->
      <form action="/login" method="get">
        <button type="submit" id="login_button">로그인으로 이동</button>
      </form>
    </div>
  </body>
</html>
