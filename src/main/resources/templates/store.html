<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>매장 할인 관리</title>
<style>
body {
	font-family: Arial;
	background: #f5f5f5;
	text-align: center;
}

.box {
	background: #fff;
	width: 400px;
	margin: 100px auto;
	padding: 30px;
	border-radius: 10px;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0, 1);
}

input, button {
	width: 100px;
	padding: 12px;
	margin-top: 10px;
	font-size: 16px;
}

button {
	background: #2196f3;
	color: white;
	border: none;
	cursor: pointer;
}
</style>
</head>

<body>
	<div class="box">
		<h2>매장할인권관리</h2>

		<!--할인권 등록-->
		<form action="/store/coupon/add" method="post">
			<button type="submit">할인권 1장 등록</button>
		</form>

		<hr>
		
		<!-- 차량할인적용 -->
		<form action="/store/coupon/use" method="post">
			<input type="text" name="carNo" placeholder="차량번호입력" required>
			<button type="submit">차량할인적용</button>
		</form>
	</div>
</body>
</html>
