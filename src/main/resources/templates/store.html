<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주차 관리 시스템</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            font-family: 'Pretendard', sans-serif;
        }

        /* 이미지의 메인 카드 레이아웃 */
        .main-card { 
            width: 100%; 
            max-width: 480px; /* 이미지 비율에 맞춘 너비 */
            background: white; 
            padding: 45px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        .title { 
            font-weight: 800; 
            margin-bottom: 35px; 
            font-size: 1.6rem;
            color: #333;
            text-align: left;
        }

        /* 이미지 상단 회색 안내 박스 */
        .info-box {
            background-color: #f1f3f5;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: left;
            font-size: 0.95rem;
            color: #666;
            line-height: 1.8;
        }

        /* [핵심 수정] 입력창과 버튼의 너비를 동일하게 100%로 설정 */
        .form-control-custom {
            width: 90%;       /* 너비 동일화 */
            height: 60px;      /* 높이 설정 */
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 0 20px;
            font-size: 1rem;
            margin-bottom: 25px; /* 입력창과 버튼 사이의 간격 */
            color: #333;
        }

        .form-control-custom::placeholder { color: #bbb; }

        /* [핵심 수정] 버튼의 너비를 입력창과 동일하게 100%로 설정 */
        .btn-search {
            width: 100%;       /* 너비 동일화 */
            height: 60px;      /* 높이 설정 */
            background-color: #2196F3;
            color: white;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            transition: background-color 0.2s;
        }

        .btn-search:hover { background-color: #1976D2; color: white; }

        /* 하단 로그인 링크 */
        .footer-link-box {
            margin-top: 35px;
            text-align: left;
        }

        .login-move-link {
            color: #0000FF;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 1px solid #0000FF;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="title">주차 관리 시스템</div>

    <!-- 매장 정보 박스 -->
    <div class="info-box">
        <p class="mb-1">관리 매장: 하이미디어</p>
        <p class="mb-0">현재 보유 쿠폰: <span th:text="${couponCount} + '개'">98개</span></p>
    </div>

    <!-- [수정 포인트] 입력창과 버튼의 너비를 100%로 일치시키고 간격 부여 -->
    <form th:action="@{/store/parking/search}" method="get">
        <input type="text" name="carNo" class="form-control-custom" 
               placeholder="출차 차량 번호를 입력하세요" th:value="${carNo}" required>
        
        <button type="submit" class="btn btn-search shadow-sm">조회 및 요금계산</button>
    </form>

    <!-- 하단 로그인 페이지 이동 링크 -->
    <div class="footer-link-box">
        <a href="/login" class="login-move-link">로그인 페이지 이동</a>
    </div>

    <!-- 검색 결과 리스트 (생략 가능) -->
    <div th:if="${carList != null}" class="mt-4">
        <!-- carList 반복문... -->
    </div>
</div>

</body>
</html>
