<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>차량 주차 기록</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 30px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

th {
    background: #f0f0f0;
}

.btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2> 차량 주차 기록</h2>

    <p>
        차량 번호 :
        <strong th:text="${carNo}">1234</strong>
    </p>

    <table>
        <thead>
            <tr>
                <th>차량 번호</th>
                <th>입차 시간</th>
                <th>출차 시간</th>
                <th>쿠폰 금액</th>
                <th>매장명</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td th:text="${records.carNo}">1234</td>
                <td th:text="${records.entryTime}">입차</td>
                <td th:text="${records.exitTime}">출차</td>
                <td th:text="${records.coupon}">0</td>
                <td th:text="${records.storeName}">하이미디어</td>
            </tr>

            <!-- 검색 결과 없을 때 -->
            <tr th:if="${#lists.isEmpty(records)}">
                <td colspan="5">검색 결과가 없습니다.</td>
            </tr>
        </tbody>
    </table>

    <button class="btn" onclick="location.href='/store'">매장 페이지로 돌아가기</button>
</div>

</body>
</html>
