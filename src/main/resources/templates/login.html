<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주차 관리 시스템 - 로그인</title>
    <!-- Bootstrap 5 CSS (경로 수정됨) -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root {
            --main-green: #4CAF50;    /* 이미지 속 입차 버튼 색상 */
            --main-skyblue: #2196F3;  /* 이미지 속 출차 버튼 색상 */
            --main-blue: #0000FF;     /* 이미지 속 로그인 버튼 색상 */
        }

        body { 
            background-color: #f8f9fa; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
        }

        /* 이미지의 메인 흰색 카드 스타일 */
        .login-container { 
            width: 100%; 
            max-width: 420px; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
        }

        .login-title { 
            font-weight: 800; 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 1.6rem;
            color: #333;
        }

        /* 이미지 좌측 상단 계정 정보 안내 박스 스타일 재현 */
        .info-box {
            background-color: #f1f3f5;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 25px;
            color: #666;
            line-height: 1.6;
        }

        /* 이미지의 입력창 스타일: 둥근 모서리와 옅은 테두리 */
        .form-control, .form-select {
            height: 55px;
            border: 1px solid #eee;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: #333;
        }

        .form-control::placeholder {
            color: #bbb;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--main-skyblue);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
            outline: none;
        }

        /* 이미지 하단의 파란색 로그인 버튼 스타일 완벽 재현 */
        .btn-login {
            background-color: var(--main-blue);
            color: white;
            border: none;
            height: 60px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 10px;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            background-color: #0000CC;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 255, 0.2);
            color: white;
        }

        .error-msg {
            color: #e03131;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-title">
        🚗 주차 관리 시스템
    </div>

    <!-- 이미지 좌측 상단 스타일 정보 박스 -->
    <div class="info-box">
        <p class="mb-1">관리자: <span class="text-dark fw-bold">admin / 1234</span></p>
        <p class="mb-0">매장: <span class="text-dark fw-bold">user / 1234</span></p>
    </div>

    <!-- 로그인 폼 -->
    <form th:action="@{/login}" method="post">
        <div class="mb-2">
            <input type="text" name="adminId" class="form-control" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="mb-2">
            <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="mb-3">
            <select name="role" class="form-select" required>
                <option value="ADMIN">관리자 로그인</option>
                <option value="STORE">매장 로그인</option>
            </select>
        </div>

        <button type="submit" class="btn btn-login shadow-sm">로그인</button>
    </form>

    <!-- 로그인 에러 메시지 -->
    <div th:if="${error}" class="error-msg">
        <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>
</div>

<!-- Bootstrap 5 JS (필요시) -->
<script src="https://cdn.jsdelivr.net"></script>
</body>
</html>
