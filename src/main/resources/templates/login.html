<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주차 관리 시스템 - 로그인</title>
</head>
<body>
    <div class="container">
        <h2>주차 관리 시스템 - 로그인</h2>

        <!-- 로그인 폼 -->
        <form action="/login" method="post">
            <div>
                <label for="username">아이디</label>
                <input type="text" name="adminId" id="username" required placeholder="아이디를 입력하세요">
            </div>
            <div>
                <label for="password">비밀번호</label>
                <input type="password" name="password" id="password" required placeholder="비밀번호를 입력하세요">
            </div>

            <!-- 로그인 유형 선택 -->
            <div>
                <label for="role">로그인유형</label>
                <select name="role" id="role" required>
                    <option value="ADMIN">관리자 로그인</option>
                    <option value="STORE">매장 로그인</option>
                </select>
            </div>

            <!-- 로그인 버튼 -->
            <button type="submit">로그인</button>
        </form>

        <!-- 로그인 실패 시 오류 메시지 출력 -->
        <!-- 진행예정. -->>
    </div>
</body>
</html>
