<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>주차 관리 시스템 - 로그인</title>
<style>
    body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; background-color: #f0f0f0; }
    .container { width: 100%; max-width: 400px; margin: 100px auto; padding: 20px; background-color: white; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); }
    h2 { margin-bottom: 30px; }
    .input-group { margin-bottom: 20px; }
    .input-group input { padding: 10px; width: 100%; font-size: 1rem; border: 1px solid #ccc; border-radius: 5px; }
    button { background-color: #4caf50; color: white; padding: 12px; margin-top: 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; width: 100%; }
    button:hover { background-color: #45a049; }
    .login-option { margin-top: 20px; }
    .login-option button { background-color: #2196F3; }
    .login-option button:hover { background-color: #1976D2; }
</style>
</head>
<body>
    <div class="container">
        <h2>주차 관리 시스템 - 로그인</h2>

        <!-- 로그인 폼 -->
        <form action="/login" method="post">
            <div class="input-group">
                <label for="username">아이디</label>
                <input type="text" name="username" id="username" required placeholder="아이디를 입력하세요">
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" name="password" id="password" required placeholder="비밀번호를 입력하세요">
            </div>

            <!-- 로그인 유형 선택 -->
            <div class="input-group">
                <label for="role">로그인유형</label>
                <select name="role" id="role" required>
                    <option value="ADMIN">관리자 로그인</option>
                    <option value="STORE">매장 로그인</option>
                </select>
            </div>

            <!-- 로그인 버튼 -->
            <button type="submit">로그인</button>
        </form>
    </div>
</body>
</html>
