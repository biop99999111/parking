<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>주차 관리 시스템 - 로그인</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        :root {
            --main-green: #4CAF50;    /* 입차 버튼 색상 */
            --main-skyblue: #2196F3;  /* 출차 버튼 색상 */
            --main-blue: #0000FF;     /* 관리자 로그인 버튼 색상 */
        }

        body { 
            background-color: #f8f9fa; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }

        .login-container { 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        .login-title { 
            font-weight: bold; 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 1.8rem;
        }

        /* 이미지의 입력창 스타일 재현 */
        .form-control, .form-select {
            height: 55px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .form-control:focus {
            border-color: var(--main-skyblue);
            box-shadow: 0 0 0 0.2rem rgba(33, 150, 243, 0.25);
        }

        /* 이미지의 파란색 버튼 스타일 */
        .btn-login {
            background-color: var(--main-blue);
            color: white;
            border: none;
            height: 60px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            opacity: 0.85;
            color: white;
        }

        /* 계정 정보 안내 박스 */
        .info-box {
            background-color: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 25px;
            color: #495057;
            border-left: 5px solid var(--main-green);
        }

        .error-msg {
            color: #ff4d4d;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-title">
        🚗 주차 관리 시스템
    </div>

    <!-- 계정 안내 정보 -->
    <div class="info-box">
        <p class="mb-1"><strong>관리자:</strong> admin / 1234</p>
        <p class="mb-0"><strong>매장:</strong> user / 1234</p>
    </div>

    <!-- 로그인 폼 -->
    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <input type="text" name="adminId" class="form-control" placeholder="아이디를 입력하세요" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="mb-4">
            <select name="role" class="form-select" required>
                <option value="ADMIN">관리자 로그인</option>
                <option value="STORE">매장 로그인</option>
            </select>
        </div>

        <button type="submit" class="btn btn-login shadow">로그인</button>
    </form>

    <!-- 에러 메시지 -->
    <div th:if="${error}" class="error-msg">
        <p th:text="${error}"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net"></script>
</body>
</html>
